<html lang="en">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --ink: #10151f;
    --ink-soft: #2a3244;
    --paper: #f5f3ee;
    --card: #ffffff;
    --line: #e4e0d6;
    --brass: #a67c3d;
    --brass-deep: #8a6530;
    --brass-tint: #f6ecd9;
    --success: #2f6b4f;
    --error: #b5433a;
    --muted: #6b7280;
  }

  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    margin: 0;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 10% 0%, rgba(166,124,61,0.06), transparent 40%),

    -webkit-font-smoothing: antialiased;

  .container { max-width: 480px; margin: 0 auto; padding: 28px 18px 48px; }

  h1, .display {
    font-family: 'Fraunces', Georgia, serif;
    font-optical-sizing: auto;
    letter-spacing: -0.01em;
  }
  h1 { font-size: 26px; margin: 0 0 6px; font-weight: 500; color: var(--ink); }
  h2 { font-size: 16px; margin: 0 0 14px; font-weight: 600; letter-spacing: -0.005em; }
  p.subtitle { color: var(--muted); margin: 0 0 26px; font-size: 14px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 14px;
    box-shadow: 0 1px 2px rgba(16,21,31,0.03), 0 8px 24px -18px rgba(16,21,31,0.25);
  }

  label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 14px 0 6px; }
  input, select {
    width: 100%;
    padding: 11px 13px;
    border: 1px solid var(--line);
    border-radius: 9px;
    font-size: 15px;
    font-family: inherit;
    background: var(--card);
    color: var(--ink);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--brass);
    box-shadow: 0 0 0 3px rgba(166,124,61,0.15);
  }

  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 9px;
    background: var(--ink);
    color: #fff;
    font-size: 14.5px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.01em;
    margin-top: 16px;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.15s ease, box-shadow 0.15s ease;
  }
  button:hover { box-shadow: 0 6px 16px -8px rgba(16,21,31,0.45); }
  button:active { transform: translateY(1px); }
  button.secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    box-shadow: none;
  }
  button.secondary:hover { border-color: var(--brass); background: var(--brass-tint); box-shadow: none; }
  button.brass {
    background: linear-gradient(180deg, var(--brass) 0%, var(--brass-deep) 100%);
    color: #fff;
  }
  button:disabled { opacity: 0.45; cursor: default; box-shadow: none; transform: none; }

  .msg { font-size: 13px; margin-top: 10px; line-height: 1.5; }
  .msg.error { color: var(--error); }
  .msg.success { color: var(--success); }
  .link { text-align: center; font-size: 14px; margin-top: 18px; color: var(--muted); }
  .link a { color: var(--brass-deep); text-decoration: none; font-weight: 600; }
  .link a:hover { text-decoration: underline; }
  .hidden { display: none; }

  .progress-bar {
    background: var(--line);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
    margin: 8px 0;
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--brass) 0%, var(--brass-deep) 100%);
    height: 100%;
    transition: width 0.4s ease;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }
  .topbar h1 { margin: 0; }
  .topbar button { width: auto; padding: 8px 16px; font-size: 12.5px; margin: 0; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .nav-tile {
    display: block;
    text-decoration: none;
    color: inherit;
  }
  .nav-tile .card {

    align-items: center;
    justify-content: space-between;

  }
  .nav-tile:hover .card { border-color: var(--brass); }
  .nav-tile .card::after {
    content: "→";
    color: var(--brass-deep);
    font-family: 'Fraunces', serif;
    font-size: 18px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 700;

    color: var(--brass-deep);

<div class="container" id="app">Loading...</div>

<script>
// ============================================================
// CONFIG — replace these placeholders with your real Supabase values
// Get them from: Supabase Dashboard -> Settings -> API
// ============================================================
const SUPABASE_URL = "https://spdyhkjlkjzqlnwlsahj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_D-_pOmWv7DvL0OoDOMTzZA_g4PBTvIt";

// The Edge Function URL is always your project URL + /functions/v1/<function-name>
const TAILOR_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/tailor-resume`;
const FETCH_JOBS_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/fetch-jobs`;
const VERIFY_PAYMENT_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/verify-payment`;

// Paystack's PUBLIC key is safe to expose in the browser — it can only
// initiate a checkout, never move money or confirm a payment on its own.
const PAYSTACK_PUBLIC_KEY = "YOUR_PAYSTACK_PUBLIC_KEY";

// Custom storage adapter so "Remember me" actually does something:
// - Checked (default): session survives closing the browser (localStorage)
// - Unchecked: session only lasts for this tab (sessionStorage) — closing
//   the browser logs the person out
// The 'cb_remember' flag is checked live on every write, so toggling the
// checkbox takes effect on the very next login without reloading the page.
const rememberAwareStorage = {
  getItem: (key) => localStorage.getItem(key) || sessionStorage.getItem(key),
  setItem: (key, value) => {
    const remember = localStorage.getItem("cb_remember") !== "false";
    if (remember) {
      localStorage.setItem(key, value);
      sessionStorage.removeItem(key);
    } else {
      sessionStorage.setItem(key, value);
      localStorage.removeItem(key);
    }
  },
  removeItem: (key) => {
    localStorage.removeItem(key);
    sessionStorage.removeItem(key);
  },
};

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { storage: rememberAwareStorage },
});

// Reads a PDF or DOCX file the user uploaded and returns its plain text,
// so it can be dropped into the resume textarea without leaving the app.
async function extractTextFromFile(file) {
  const name = file.name.toLowerCase();

  if (name.endsWith(".pdf")) {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(" ") + "\n";
    }
    return text.trim();
  }

  if (name.endsWith(".docx")) {
    const buffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: buffer });
    return result.value.trim();
  }

  if (name.endsWith(".doc")) {
    throw new Error("Old .doc format isn't supported — please save as .docx or .pdf and try again.");
  }

  // Fallback: plain text file
  return await file.text();
}

const app = document.getElementById("app");

// Simple hash-based router: #login, #signup, #dashboard, #profile
window.addEventListener("hashchange", render);
window.addEventListener("DOMContentLoaded", render);

// Supabase fires this when someone arrives via a password-reset email link.
// We force them to the reset screen regardless of whatever hash was in the
// URL, since the recovery token itself is what matters, not the route.
sb.auth.onAuthStateChange((event) => {
  if (event === "PASSWORD_RECOVERY") {
    window.location.hash = "reset-password";
    render();
  }
});

async function render() {
  const { data: { user } } = await sb.auth.getUser();
  const route = window.location.hash.replace("#", "") || (user ? "dashboard" : "login");

  if (!user && (route === "dashboard" || route === "profile")) {
    window.location.hash = "login";
    return renderLogin();
  }

  if (route === "signup") return renderSignup();
  if (route === "forgot-password") return renderForgotPassword();
  if (route === "reset-password") return renderResetPassword();
  if (route === "dashboard") return renderDashboard(user);
  if (route === "profile") return renderProfile(user);
  if (route === "match") return renderMatch(user);
  if (route === "jobs") return renderJobs(user);
  if (route === "queue") return renderQueue(user);
  if (route === "tracker") return renderTracker(user);
  if (route === "interview") return renderInterview(user);
  if (route === "billing") return renderBilling(user);
  if (route === "admin") return renderAdmin(user);
  return renderLogin();
}

// ------------------------------------------------------------
// LOGIN
// ------------------------------------------------------------
function renderLogin() {
  app.innerHTML = `
    <div class="card">
      <h1>Career Bridge</h1>
      <p class="subtitle">Your AI Career Copilot</p>
      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" required />
        <label>Password</label>
        <div style="position:relative;">
          <input type="password" id="password" required style="padding-right:44px;" />
          <button type="button" id="togglePassword" style="position:absolute;right:6px;top:6px;width:auto;margin:0;padding:6px 10px;font-size:12px;background:#f0f0f0;color:#111;">Show</button>
        </div>

        <label style="display:flex;align-items:center;gap:8px;margin-top:14px;">
          <input type="checkbox" id="rememberMe" checked style="width:auto;" />
          <span style="font-size:14px;color:#555;">Remember me</span>
        </label>

        <div class="msg error hidden" id="loginMsg"></div>
        <button type="submit" id="loginBtn">Log In</button>
      </form>
      <p class="link"><a href="#forgot-password">Forgot password?</a></p>
      <p class="link">No account? <a href="#signup">Sign up</a></p>
    </div>
  `;

  document.getElementById("togglePassword").addEventListener("click", (e) => {
    const pwInput = document.getElementById("password");
    const isHidden = pwInput.type === "password";
    pwInput.type = isHidden ? "text" : "password";
    e.target.textContent = isHidden ? "Hide" : "Show";
  });

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("loginBtn");
    const msg = document.getElementById("loginMsg");
    btn.disabled = true;
    btn.textContent = "Logging in...";

    // Set the remember-me preference BEFORE signing in, so the session
    // gets written to the right storage (localStorage vs sessionStorage).
    const remember = document.getElementById("rememberMe").checked;
    localStorage.setItem("cb_remember", remember ? "true" : "false");

    const { error } = await sb.auth.signInWithPassword({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value,
    });

    if (error) {
      msg.textContent = error.message;
      msg.classList.remove("hidden");
      btn.disabled = false;
      btn.textContent = "Log In";
      return;
    }

    window.location.hash = "dashboard";
    render();
  });
}

// SIGNUP
// ------------------------------------------------------------
function renderSignup() {
  app.innerHTML = `
    <div class="card">
      <h1>Create your account</h1>
      <form id="signupForm">
        <label>Full name</label>
        <input type="text" id="fullName" required />
        <label>Email</label>
        <input type="email" id="email" required />
        <label>Password (min 6 characters)</label>
        <div style="position:relative;">
          <input type="password" id="password" minlength="6" required style="padding-right:44px;" />
          <button type="button" id="togglePassword" style="position:absolute;right:6px;top:6px;width:auto;margin:0;padding:6px 10px;font-size:12px;background:#f0f0f0;color:#111;">Show</button>
        </div>
        <div class="msg error hidden" id="signupMsg"></div>
        <button type="submit" id="signupBtn">Sign Up</button>
      </form>
      <p class="link">Already have an account? <a href="#login">Log in</a></p>
    </div>
  `;

  document.getElementById("togglePassword").addEventListener("click", (e) => {
    const pwInput = document.getElementById("password");
    const isHidden = pwInput.type === "password";
    pwInput.type = isHidden ? "text" : "password";
    e.target.textContent = isHidden ? "Hide" : "Show";
  });

  document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("signupBtn");
    const msg = document.getElementById("signupMsg");
    btn.disabled = true;
    btn.textContent = "Creating account...";

    const fullName = document.getElementById("fullName").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: { data: { full_name: fullName } },
    });

    if (error) {
      msg.textContent = error.message;
      msg.classList.remove("hidden");
      btn.disabled = false;
      btn.textContent = "Sign Up";
      return;
    }

    // Create the profile row ourselves (no server-side trigger in this version)
    if (data.user) {
      await sb.from("profiles").upsert({
        id: data.user.id,
        full_name: fullName,
        email: email,
      });
    }

    app.innerHTML = `
      <div class="card">
        <h2>Check your email</h2>
        <p>We sent a confirmation link to <strong>${email}</strong>. Click it, then come back and log in.</p>
        <p class="link"><a href="#login">Go to login</a></p>
      </div>
    `;
  });
}

// ------------------------------------------------------------
// FORGOT PASSWORD
// ------------------------------------------------------------
function renderForgotPassword() {
  app.innerHTML = `
    <div class="card">
      <h1>Reset your password</h1>
      <p class="subtitle">We'll email you a link to set a new one.</p>
      <form id="forgotForm">
        <label>Email</label>
        <input type="email" id="email" required />
        <div class="msg hidden" id="forgotMsg"></div>
        <button type="submit" id="forgotBtn">Send Reset Link</button>
      </form>
      <p class="link"><a href="#login">Back to login</a></p>
    </div>
  `;

  document.getElementById("forgotForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("forgotBtn");
    const msg = document.getElementById("forgotMsg");
    btn.disabled = true;
    btn.textContent = "Sending...";

    const email = document.getElementById("email").value;

    // redirectTo tells Supabase where to send the person after they click
    // the emailed link — it lands here with a recovery session active,
    // which renderResetPassword below uses to let them set a new password.
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: `${window.location.origin}${window.location.pathname}#reset-password`,
    });

    msg.classList.remove("hidden");
    if (error) {
      msg.className = "msg error";
      msg.textContent = error.message;
      btn.disabled = false;
      btn.textContent = "Send Reset Link";
    } else {
      msg.className = "msg success";
      msg.textContent = `If an account exists for ${email}, a reset link has been sent. Check your inbox.`;
      btn.textContent = "Link Sent";
    }
  });
}

// ------------------------------------------------------------
// RESET PASSWORD (landed here from the emailed link)
// ------------------------------------------------------------
function renderResetPassword() {
  app.innerHTML = `
    <div class="card">
      <h1>Set a new password</h1>
      <form id="resetForm">
        <label>New password (min 6 characters)</label>
        <div style="position:relative;">
          <input type="password" id="newPassword" minlength="6" required style="padding-right:44px;" />
          <button type="button" id="togglePassword" style="position:absolute;right:6px;top:6px;width:auto;margin:0;padding:6px 10px;font-size:12px;background:#f0f0f0;color:#111;">Show</button>
        </div>
        <div class="msg hidden" id="resetMsg"></div>
        <button type="submit" id="resetBtn">Update Password</button>
      </form>
    </div>
  `;

  document.getElementById("togglePassword").addEventListener("click", (e) => {
    const pwInput = document.getElementById("newPassword");
    const isHidden = pwInput.type === "password";
    pwInput.type = isHidden ? "text" : "password";
    e.target.textContent = isHidden ? "Hide" : "Show";
  });

  document.getElementById("resetForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("resetBtn");
    const msg = document.getElementById("resetMsg");
    btn.disabled = true;
    btn.textContent = "Updating...";

    const { error } = await sb.auth.updateUser({
      password: document.getElementById("newPassword").value,
    });

    msg.classList.remove("hidden");
    if (error) {
      msg.className = "msg error";
      msg.textContent = error.message;
      btn.disabled = false;
      btn.textContent = "Update Password";
    } else {
      msg.className = "msg success";
      msg.textContent = "Password updated! Redirecting to your dashboard...";
      setTimeout(() => {
        window.location.hash = "dashboard";
        render();
      }, 1500);
    }
  });
}

async function renderProfile(user) {
  const { data: p } = await sb.from("profiles").select("*").eq("id", user.id).single();
  const v = p || {};
  const arr = (a) => (a || []).join(", ");

  app.innerHTML = `
    <div class="topbar">
      <h1 style="font-size:20px;margin:0;">Your Profile</h1>
      <button class="secondary" id="backBtn">Back</button>
    </div>

    <div class="card">
      <form id="profileForm">
        ${field("full_name", "Full name", v.full_name)}
        ${field("current_location", "Current location", v.current_location)}
        ${selectField("country", "Country", v.country, COUNTRIES)}
        ${field("state", "State", v.state)}
        ${field("city", "City", v.city)}

        ${selectField("preferred_job_type", "Preferred job type", v.preferred_job_type, JOB_TYPE_OPTIONS)}
        ${selectField("remote_or_hybrid", "Remote or hybrid", v.remote_or_hybrid, REMOTE_HYBRID_OPTIONS)}
        ${selectField("experience_level", "Experience level", v.experience_level, EXPERIENCE_LEVEL_OPTIONS)}
        ${field("education", "Education", v.education)}
        ${field("skills", "Skills (comma-separated)", arr(v.skills))}
        ${field("languages", "Languages (comma-separated)", arr(v.languages))}
        ${field("years_of_experience", "Years of experience", v.years_of_experience, "number")}
        ${selectField("availability", "Availability", v.availability, AVAILABILITY_OPTIONS)}
        ${field("preferred_industries", "Preferred industries (comma-separated)", arr(v.preferred_industries))}
        ${field("preferred_roles", "Preferred roles (comma-separated)", arr(v.preferred_roles))}

        <div class="msg hidden" id="saveMsg"></div>
        <button type="submit" id="saveBtn">Save Profile</button>

    </div>

    <div class="card">
      <h2>Upload Resume</h2>
      <input type="file" id="resumeFile" accept=".pdf,.doc,.docx" />
      <button class="secondary" id="uploadBtn">Upload</button>
      <div class="msg hidden" id="uploadMsg"></div>
    </div>
  `;

  document.getElementById("backBtn").addEventListener("click", () => {
    window.location.hash = "dashboard";
  });

  document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("saveBtn");
    const msg = document.getElementById("saveMsg");
    btn.disabled = true;
    btn.textContent = "Saving...";

    const get = (id) => document.getElementById(id).value;
    const toArr = (s) => s.split(",").map(x => x.trim()).filter(Boolean);

    const fields = {
      full_name: get("full_name"),
      current_location: get("current_location"),
      country: get("country"),
      state: get("state"),
      city: get("city"),
      postal_code: get("postal_code"),
      nationality: get("nationality"),
      work_authorization: get("work_authorization"),
      preferred_countries: toArr(get("preferred_countries")),
      preferred_salary: get("preferred_salary"),
      preferred_job_type: get("preferred_job_type"),
      remote_or_hybrid: get("remote_or_hybrid"),
      experience_level: get("experience_level"),
      education: get("education"),
      skills: toArr(get("skills")),
      languages: toArr(get("languages")),
      years_of_experience: get("years_of_experience") ? Number(get("years_of_experience")) : null,
      availability: get("availability"),
      preferred_industries: toArr(get("preferred_industries")),
      preferred_roles: toArr(get("preferred_roles")),
    };

    // Completion % = filled fields / total fields
    const total = Object.keys(fields).length;
    const filled = Object.values(fields).filter(x => x && (Array.isArray(x) ? x.length : String(x).trim())).length;
    fields.profile_completion_percent = Math.round((filled / total) * 100);
    fields.updated_at = new Date().toISOString();

    const { error } = await sb.from("profiles").update(fields).eq("id", user.id);

    btn.disabled = false;
    btn.textContent = "Save Profile";
    msg.classList.remove("hidden");
    msg.className = error ? "msg error" : "msg success";
    msg.textContent = error ? error.message : "Profile saved.";
  });

  document.getElementById("uploadBtn").addEventListener("click", async () => {
    const fileInput = document.getElementById("resumeFile");
    const msg = document.getElementById("uploadMsg");
    const file = fileInput.files[0];
    if (!file) return;

    msg.classList.remove("hidden");
    msg.className = "msg";
    msg.textContent = "Uploading...";

    // Stored at documents/{user_id}/resume-{filename}
    // RLS storage policy checks that the first folder matches auth.uid()
    const path = `${user.id}/resume-${file.name}`;
    const { error } = await sb.storage.from("documents").upload(path, file, { upsert: true });

    if (error) {
      msg.className = "msg error";
      msg.textContent = error.message;
      return;
    }

    // Also extract the text content and save it, so the AI screens
    // (Match & Tailor, Interview Prep) have it ready automatically.
    try {
      const text = await extractTextFromFile(file);
      await sb.from("profiles").update({ resume_text: text }).eq("id", userId);
      msg.className = "msg success";
      msg.textContent = "Resume uploaded and text extracted — ready for AI matching.";
    } catch (extractErr) {
      msg.className = "msg success";
      msg.textContent = "Resume uploaded. (Text extraction failed — you can paste it manually on the AI Match page.)";
    }
  });
}

async function renderMatch(user) {
  const { data: p } = await sb.from("profiles").select("*").eq("id", user.id).single();

  app.innerHTML = `
    <div class="topbar">
      <h1 style="font-size:20px;margin:0;">AI Match &amp; Tailor</h1>
      <button class="secondary" id="backBtn">Back</button>
    </div>

    <div class="card">
      <label>Upload resume (PDF or DOCX) — or paste text below</label>
      <input type="file" id="resumeFileInput" accept=".pdf,.docx,.txt" />
      <div class="msg hidden" id="extractMsg"></div>

      <label>Resume text</label>
      <textarea id="resumeText" rows="8" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;">${p?.resume_text || ''}</textarea>

      <label>Paste the job description</label>
      <textarea id="jobDesc" rows="8" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;"></textarea>

      <button id="scoreBtn">Get Match Score</button>
      <button class="secondary" id="tailorBtn">Tailor My Resume</button>
      <button class="secondary" id="coverBtn">Generate Cover Letter</button>

      <div class="msg hidden" id="matchMsg"></div>
    </div>

    <div class="card hidden" id="resultCard">
      <h2 id="resultTitle">Result</h2>
      <div id="resultBody" style="white-space:pre-wrap;font-size:14px;line-height:1.5;"></div>
    </div>
  `;

  document.getElementById("backBtn").addEventListener("click", () => {
    window.location.hash = "dashboard";
  });

  document.getElementById("resumeFileInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const msg = document.getElementById("extractMsg");
    msg.classList.remove("hidden");
    msg.className = "msg";
    msg.textContent = "Reading file...";

    try {
      const text = await extractTextFromFile(file);
      document.getElementById("resumeText").value = text;
      msg.className = "msg success";
      msg.textContent = "Resume text loaded. Review below, then continue.";
    } catch (err) {
      msg.className = "msg error";
      msg.textContent = err.message;
    }
  });

  async function callTailorFunction(action) {
    const resumeText = document.getElementById("resumeText").value.trim();
    const jobDescription = document.getElementById("jobDesc").value.trim();
    const msg = document.getElementById("matchMsg");
    const resultCard = document.getElementById("resultCard");
    const resultBody = document.getElementById("resultBody");
    const resultTitle = document.getElementById("resultTitle");

    if (!resumeText || !jobDescription) {
      msg.classList.remove("hidden");
      msg.className = "msg error";
      msg.textContent = "Please paste both your resume and the job description.";
      return;
    }

    const usage = await checkUsageAllowed(user);
    if (!usage.allowed) {
      msg.classList.remove("hidden");
      msg.className = "msg error";
      msg.textContent = `You've used all ${usage.limit} AI actions on the ${usage.plan} plan this month. Upgrade on the Billing page for more.`;
      return;
    }

    msg.classList.remove("hidden");
    msg.className = "msg";
    msg.textContent = "Thinking... this can take a few seconds.";
    resultCard.classList.add("hidden");

    // Save resume text to profile so it's pre-filled next time
    await sb.from("profiles").update({ resume_text: resumeText }).eq("id", user.id);

    try {
      const { data: sessionData } = await sb.auth.getSession();
      const token = sessionData.session.access_token;

      const res = await fetch(TAILOR_FUNCTION_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`,
          "apikey": SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({ resumeText, jobDescription, action }),
      });

      const data = await res.json();
      msg.classList.add("hidden");

      if (data.error) {
        msg.classList.remove("hidden");
        msg.className = "msg error";
        msg.textContent = data.error;
        return;
      }

      await logUsage(user, action);

      const titles = {
        score: "Match Score",
        tailor_resume: "Tailored Resume",
        cover_letter: "Cover Letter",
      };
      resultTitle.textContent = titles[action] || "Result";

      if (action === "score") {
        try {
          const parsed = JSON.parse(data.result);
          resultBody.textContent =
            `Overall Match: ${parsed.overall_score}%\n` +
            `Skills Match: ${parsed.skills_match}%\n\n` +
            `Matched Skills: ${(parsed.matched_skills || []).join(", ")}\n\n` +
            `Missing Skills: ${(parsed.missing_skills || []).join(", ")}\n\n` +
            `Recommendations:\n- ${(parsed.recommendations || []).join("\n- ")}`;
        } catch {
          resultBody.textContent = data.result;
        }
      } else {
        resultBody.textContent = data.result;
      }

      resultCard.classList.remove("hidden");
    } catch (err) {
      msg.classList.remove("hidden");
      msg.className = "msg error";
      msg.textContent = "Something went wrong: " + err.message;
    }
  }

  document.getElementById("scoreBtn").addEventListener("click", () => callTailorFunction("score"));
  document.getElementById("tailorBtn").addEventListener("click", () => callTailorFunction("tailor_resume"));
  document.getElementById("coverBtn").addEventListener("click", () => callTailorFunction("cover_letter"));
}

async function renderJobs(user) {
  const { data: profile } = await sb.from("profiles").select("resume_text, is_admin").eq("id", user.id).single();
  const resumeText = profile?.resume_text || "";
  const isAdmin = profile?.is_admin || false;

  app.innerHTML = `
    <div class="topbar">
      <h1 style="font-size:20px;margin:0;">Job Discovery</h1>
      <button class="secondary" id="backBtn">Back</button>
    </div>

    ${!resumeText ? `
      <div class="card">
        <p class="msg error">No resume text saved yet. Go to <a href="#match">AI Match &amp; Tailor</a> and paste your resume once so job scoring works.</p>
      </div>
    ` : ''}

    ${isAdmin ? `
      <div class="card">
        <button id="fetchBtn">Fetch Latest Jobs (Admin)</button>
        <div class="msg hidden" id="fetchMsg"></div>
      </div>
    ` : ''}

    <div class="card">
      <label>Search keywords (title, company, location)</label>
      <input type="text" id="keywordSearch" placeholder="e.g. school, principal, education, teacher" />

      <label>Filter by source</label>
      <select id="sourceFilter">
        <option value="">All sources</option>
        <option value="remoteok">RemoteOK</option>
        <option value="arbeitnow">Arbeitnow</option>
        <option value="jobicy">Jobicy</option>
        <option value="adzuna">Adzuna</option>
      </select>
    </div>

    <div id="jobsList"></div>
    <div id="loadMoreWrap"></div>
  `;

  let currentPage = 0;
  const PAGE_SIZE = 30;
  let allLoadedJobs = [];

  document.getElementById("sourceFilter").addEventListener("change", () => {
    currentPage = 0;
    loadJobsList(false);
  });

  let searchTimeout;
  document.getElementById("keywordSearch").addEventListener("input", () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      currentPage = 0;
      loadJobsList(false);
    }, 400); // wait briefly after typing stops before searching
  });

  document.getElementById("backBtn").addEventListener("click", () => {
    window.location.hash = "dashboard";
  });

  const fetchBtnEl = document.getElementById("fetchBtn");
  if (fetchBtnEl) {
    fetchBtnEl.addEventListener("click", async () => {
    const btn = document.getElementById("fetchBtn");
    const msg = document.getElementById("fetchMsg");
    btn.disabled = true;
    btn.textContent = "Fetching...";
    msg.classList.remove("hidden");
    msg.className = "msg";
    msg.textContent = "Pulling latest listings...";

    try {
      const { data: sessionData } = await sb.auth.getSession();
      const token = sessionData.session.access_token;

      const res = await fetch(FETCH_JOBS_FUNCTION_URL, {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}`, "apikey": SUPABASE_ANON_KEY },
      });
      const data = await res.json();

      msg.className = data.error ? "msg error" : "msg success";
      msg.textContent = data.error || `Fetched ${data.fetched} across all sources, added/updated ${data.upserted}.`;
    } catch (err) {
      msg.className = "msg error";
      msg.textContent = "Fetch failed: " + err.message;
    }

    btn.disabled = false;
    btn.textContent = "Fetch Latest Jobs (Admin)";
    currentPage = 0;
    loadJobsList(false);
    });
  }

  async function loadJobsList(append = false) {
    const listEl = document.getElementById("jobsList");
    const loadMoreWrap = document.getElementById("loadMoreWrap");
    if (!append) listEl.innerHTML = `<p class="msg">Loading jobs...</p>`;

    const selectedSource = document.getElementById("sourceFilter")?.value || "";
    const keyword = document.getElementById("keywordSearch")?.value.trim() || "";

    let query = sb.from("jobs").select("*").order("posted_at", { ascending: false });
    if (selectedSource) query = query.eq("source", selectedSource);

    if (keyword) {
      // Matches the keyword against title, company, or location (case-insensitive)
      query = query.or(
        `title.ilike.%${keyword}%,company.ilike.%${keyword}%,location.ilike.%${keyword}%,category.ilike.%${keyword}%`
      );
    }

    query = query.range(currentPage * PAGE_SIZE, currentPage * PAGE_SIZE + PAGE_SIZE - 1);

    const { data: jobs } = await query;

    if (!append) allLoadedJobs = [];
    const newJobs = jobs || [];
    allLoadedJobs = append ? [...allLoadedJobs, ...newJobs] : newJobs;

    if (allLoadedJobs.length === 0) {
      listEl.innerHTML = `<p class="msg">No jobs match${keyword ? ` "${keyword}"` : ''} yet. Try a different keyword, or tap "Fetch Latest Jobs" above.</p>`;
      loadMoreWrap.innerHTML = "";
      return;
    }

    const { data: matches } = await sb
      .from("job_matches")
      .select("*")
      .eq("user_id", user.id);

    const matchByJobId = {};
    (matches || []).forEach(m => matchByJobId[m.job_id] = m);

    listEl.innerHTML = allLoadedJobs.map(job => {
      const match = matchByJobId[job.id];
      return `
        <div class="card">
          <h2 style="font-size:16px;">${job.title}</h2>
          <p class="msg">${job.company} · ${job.location}${job.salary ? ' · ' + job.salary : ''}</p>
          <p class="msg" style="text-transform:uppercase;font-size:11px;letter-spacing:0.5px;color:#999;">${job.source}</p>
          ${match
            ? `<p class="msg success">Match score: ${match.overall_score}%</p>
               ${match.prepared_at
                 ? `<p class="msg success">✓ Application prepared</p><a href="#queue" style="font-size:13px;">View in Application Queue →</a>`
                 : `<button class="secondary prepare-btn" data-job-id="${job.id}">Prepare Full Application</button>`
               }
               <div class="msg hidden prepare-result" id="prepare-${job.id}"></div>`
            : `<button class="secondary score-btn" data-job-id="${job.id}" ${!resumeText ? 'disabled' : ''}>Score This Job</button>`
          }
          <div class="msg hidden score-result" id="score-${job.id}"></div>
          <a href="${job.url}" target="_blank" style="font-size:13px;">View original listing →</a>
        </div>
      `;
    }).join("");

    document.querySelectorAll(".score-btn").forEach(btn => {
      btn.addEventListener("click", () => scoreJob(btn.dataset.jobId, allLoadedJobs));
    });

    document.querySelectorAll(".prepare-btn").forEach(btn => {
      btn.addEventListener("click", () => prepareApplication(btn.dataset.jobId, allLoadedJobs));
    });

    // Show "Load More" only if this page came back full (more may exist)
    if (newJobs.length === PAGE_SIZE) {
      loadMoreWrap.innerHTML = `<button class="secondary" id="loadMoreBtn" style="margin:12px 0;">Load More</button>`;
      document.getElementById("loadMoreBtn").addEventListener("click", () => {
        currentPage++;
        loadJobsList(true);
      });
    } else {
      loadMoreWrap.innerHTML = "";
    }
  }

  async function scoreJob(jobId, jobs) {
    const job = jobs.find(j => j.id === jobId);
    const resultEl = document.getElementById(`score-${jobId}`);
    resultEl.classList.remove("hidden");

    const usage = await checkUsageAllowed(user);
    if (!usage.allowed) {
      resultEl.textContent = `You've used all ${usage.limit} AI actions on the ${usage.plan} plan this month. Upgrade on the Billing page.`;
      return;
    }

    resultEl.textContent = "Scoring...";

    try {
      const { data: sessionData } = await sb.auth.getSession();
      const token = sessionData.session.access_token;

      const res = await fetch(TAILOR_FUNCTION_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`,
          "apikey": SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({
          resumeText,
          jobDescription: job.description,
          action: "score",
        }),
      });
      const data = await res.json();
      const parsed = JSON.parse(data.result);

      await sb.from("job_matches").upsert({
        user_id: user.id,
        job_id: jobId,
        overall_score: parsed.overall_score,
        skills_match: parsed.skills_match,
        missing_skills: parsed.missing_skills,
        matched_skills: parsed.matched_skills,
      });

      resultEl.className = "msg success";
      resultEl.textContent = `Match score: ${parsed.overall_score}%`;
      loadJobsList(false);
    } catch (err) {
      resultEl.className = "msg error";
      resultEl.textContent = "Scoring failed: " + err.message;
    }
  }

  // Calls Groq three times (tailored resume, cover letter, application
  // answers) for one job and saves everything together, so the Application
  // Queue can show a fully ready-to-submit package in one place.
  async function prepareApplication(jobId, jobs) {
    const job = jobs.find(j => j.id === jobId);
    const resultEl = document.getElementById(`prepare-${jobId}`);
    resultEl.classList.remove("hidden");

    const usage = await checkUsageAllowed(user);
    if (!usage.allowed) {
      resultEl.className = "msg error";
      resultEl.textContent = `You've used all ${usage.limit} AI actions on the ${usage.plan} plan this month. Preparing a full application uses 3 actions. Upgrade on the Billing page.`;
      return;
    }
    // Preparing a full application costs 3 credits (resume + cover letter + answers).
    // Warn up front if there isn't enough room left this month, rather than
    // failing partway through and leaving a half-prepared application.
    if (usage.limit !== undefined && (usage.used ?? 0) + 3 > usage.limit) {
      resultEl.className = "msg error";
      resultEl.textContent = `Preparing a full application uses 3 AI actions, but you only have ${usage.limit - (usage.used ?? 0)} left this month. Upgrade on the Billing page, or use individual actions instead.`;
      return;
    }

    resultEl.className = "msg";
    resultEl.textContent = "Preparing tailored resume...";

    try {
      const { data: sessionData } = await sb.auth.getSession();
      const token = sessionData.session.access_token;

      async function callAI(action) {
        const res = await fetch(TAILOR_FUNCTION_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`,
            "apikey": SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ resumeText, jobDescription: job.description, action }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        return data.result;
      }

      const tailoredResume = await callAI("tailor_resume");
      await logUsage(user, "tailor_resume");

      resultEl.textContent = "Writing cover letter...";
      const coverLetter = await callAI("cover_letter");
      await logUsage(user, "cover_letter");

      resultEl.textContent = "Drafting application answers...";
      const answersRaw = await callAI("application_answers");
      await logUsage(user, "application_answers");

      await sb.from("job_matches").update({
        tailored_resume: tailoredResume,
        cover_letter: coverLetter,
        application_answers: answersRaw,
        prepared_at: new Date().toISOString(),
      }).eq("user_id", user.id).eq("job_id", jobId);

      resultEl.className = "msg success";
      resultEl.textContent = "Application prepared! View it in your Application Queue.";
      loadJobsList(false);
    } catch (err) {
      resultEl.className = "msg error";
      resultEl.textContent = "Preparation failed: " + err.message;
    }
  }

  loadJobsList(false);
}

  if (!matches || matches.length === 0) {

    return;
  }

  body.innerHTML = STATUSES.map(s => {
    const items = matches.filter(m => (m.status || "new") === s.key);
    if (items.length === 0) return "";

    return `
      <h2 style="font-size:15px;margin:20px 0 8px;color:#555;">${s.label} (${items.length})</h2>
      ${items.map(m => `
        <div class="card">
          <h2 style="font-size:16px;">${m.jobs?.title || "Untitled"}</h2>
          <p class="msg">${m.jobs?.company || ""} · ${m.jobs?.location || ""}</p>
          <p class="msg">Match: ${m.overall_score ?? "—"}%</p>

          <label>Status</label>
          <select class="status-select" data-match-id="${m.id}">
            ${STATUSES.map(opt => `<option value="${opt.key}" ${opt.key === (m.status || "new") ? "selected" : ""}>${opt.label}</option>`).join("")}
          </select>

          <label>Follow-up date</label>
          <input type="date" class="followup-input" data-match-id="${m.id}" value="${m.follow_up_date || ""}" />

          <label>Notes</label>
          <input type="text" class="notes-input" data-match-id="${m.id}" value="${m.notes ? m.notes.replace(/"/g, '&quot;') : ''}" placeholder="Recruiter name, interview details, etc." />

          <button class="secondary save-tracker-btn" data-match-id="${m.id}" style="margin-top:10px;">Save</button>
          <div class="msg hidden" id="trackerMsg-${m.id}"></div>

          ${m.jobs?.url ? `<a href="${m.jobs.url}" target="_blank" style="font-size:13px;display:block;margin-top:8px;">View original listing →</a>` : ""}
        </div>
      `).join("")}
    `;
  }).join("");

  document.querySelectorAll(".save-tracker-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = btn.dataset.matchId;
      const status = document.querySelector(`.status-select[data-match-id="${id}"]`).value;
      const followUp = document.querySelector(`.followup-input[data-match-id="${id}"]`).value;
      const notes = document.querySelector(`.notes-input[data-match-id="${id}"]`).value;
      const msg = document.getElementById(`trackerMsg-${id}`);

      const updates = {
        status,
        notes,
        follow_up_date: followUp || null,
      };
      if (status === "applied") updates.applied_at = new Date().toISOString();

      const { error } = await sb.from("job_matches").update(updates).eq("id", id);

      msg.classList.remove("hidden");
      msg.className = error ? "msg error" : "msg success";
      msg.textContent = error ? error.message : "Saved.";

      if (!error) setTimeout(() => renderTracker(user), 500);
    });
  });
}

async function renderInterview(user) {
  const { data: profile } = await sb.from("profiles").select("resume_text").eq("id", user.id).single();
  const resumeText = profile?.resume_text || "";

  app.innerHTML = `
    <div class="topbar">
      <h1 style="font-size:20px;margin:0;">Interview Prep</h1>
      <button class="secondary" id="backBtn">Back</button>
    </div>

    <div class="card">
      <label>Upload resume (PDF or DOCX) — or paste text below</label>
      <input type="file" id="resumeFileInput" accept=".pdf,.docx,.txt" />
      <div class="msg hidden" id="extractMsg"></div>

      <label>Your resume text</label>
      <textarea id="resumeText" rows="6" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;">${resumeText}</textarea>

      <label>Job description you're interviewing for</label>
      <textarea id="jobDesc" rows="6" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;"></textarea>

      <button id="prepBtn">Generate Interview Prep</button>
      <div class="msg hidden" id="prepMsg"></div>
    </div>

    <div id="prepResults"></div>
  `;

  document.getElementById("backBtn").addEventListener("click", () => {
    window.location.hash = "dashboard";
  });

  document.getElementById("resumeFileInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const msg = document.getElementById("extractMsg");
    msg.classList.remove("hidden");
    msg.className = "msg";
    msg.textContent = "Reading file...";

    try {
      const text = await extractTextFromFile(file);
      document.getElementById("resumeText").value = text;
      msg.className = "msg success";
      msg.textContent = "Resume text loaded. Review below, then continue.";
    } catch (err) {
      msg.className = "msg error";
      msg.textContent = err.message;
    }
  });

  document.getElementById("prepBtn").addEventListener("click", async () => {
    const resume = document.getElementById("resumeText").value.trim();
    const jobDescription = document.getElementById("jobDesc").value.trim();
    const btn = document.getElementById("prepBtn");
    const msg = document.getElementById("prepMsg");
    const results = document.getElementById("prepResults");

    if (!resume || !jobDescription) {
      msg.classList.remove("hidden");
      msg.className = "msg error";
      msg.textContent = "Please paste both your resume and the job description.";
      return;
    }

    const usage = await checkUsageAllowed(user);
    if (!usage.allowed) {
      msg.classList.remove("hidden");
      msg.className = "msg error";
      msg.textContent = `You've used all ${usage.limit} AI actions on the ${usage.plan} plan this month. Upgrade on the Billing page for more.`;
      return;
    }

    btn.disabled = true;
    btn.textContent = "Preparing...";
    msg.classList.remove("hidden");
    msg.className = "msg";
    msg.textContent = "Generating your interview prep — this can take a few seconds.";
    results.innerHTML = "";

    await sb.from("profiles").update({ resume_text: resume }).eq("id", user.id);

    try {
      const { data: sessionData } = await sb.auth.getSession();
      const token = sessionData.session.access_token;

      const res = await fetch(TAILOR_FUNCTION_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`,
          "apikey": SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({ resumeText: resume, jobDescription, action: "interview_prep" }),
      });

      const data = await res.json();
      msg.classList.add("hidden");

      if (data.error) {
        msg.classList.remove("hidden");
        msg.className = "msg error";
        msg.textContent = data.error;
        return;
      }

      const prep = JSON.parse(data.result);

      await logUsage(user, "interview_prep");

      results.innerHTML = `
        ${prepSection("Likely Questions", prep.likely_questions)}
        ${prepSection("Technical Questions", prep.technical_questions)}
        ${prepSection("Behavioral Questions", prep.behavioral_questions)}
        ${prepStarSection(prep.star_examples)}
        ${prepSection("Company Research Tips", prep.company_research_tips)}
        ${prepSection("Questions To Ask Your Interviewer", prep.questions_to_ask_interviewer)}
      `;
    } catch (err) {
      msg.classList.remove("hidden");
      msg.className = "msg error";
      msg.textContent = "Something went wrong: " + err.message;
    }

    btn.disabled = false;
    btn.textContent = "Generate Interview Prep";
  });
}

function prepSection(title, items) {
  if (!items || items.length === 0) return "";
  return `
    <div class="card">
      <h2 style="font-size:16px;">${title}</h2>
      <ul style="margin:0;padding-left:20px;font-size:14px;line-height:1.6;">
        ${items.map(i => `<li>${i}</li>`).join("")}
      </ul>
    </div>
  `;
}

function prepStarSection(examples) {
  if (!examples || examples.length === 0) return "";
  return `
    <div class="card">
      <h2 style="font-size:16px;">STAR Answer Guidance</h2>
      ${examples.map(ex => `
        <p style="font-size:14px;margin:0 0 4px;"><strong>${ex.question}</strong></p>
        <p style="font-size:14px;color:#555;margin:0 0 14px;">${ex.suggested_approach}</p>
      `).join("")}
    </div>
  `;
}

// ------------------------------------------------------------
// BILLING (Phase 6)
// ------------------------------------------------------------
const PLAN_LIMITS = {
  free: 15,
  basic: 50,
  pro: 200,
  premium: Infinity,
};

const PLANS = [
  { key: "basic", label: "Basic", price: 5000, amountKobo: 500000, credits: 50 },
  { key: "pro", label: "Pro", price: 15000, amountKobo: 1500000, credits: 200 },
  { key: "premium", label: "Premium", price: 30000, amountKobo: 3000000, credits: "Unlimited" },
];

// Call this before any credit-consuming action (AI score, tailor, cover
// letter, interview prep, or job fetching) to enforce the plan's monthly
// limit. Admins bypass this entirely — unlimited, no logging required.
async function checkUsageAllowed(user) {
  const { data: profile } = await sb.from("profiles").select("is_admin").eq("id", user.id).single();
  if (profile?.is_admin) {
    return { allowed: true, unlimited: true, isAdmin: true };
  }

  const { data: subscription } = await sb.from("subscriptions").select("plan").eq("user_id", user.id).single();
  const plan = subscription?.plan || "free";
  const limit = PLAN_LIMITS[plan] ?? PLAN_LIMITS.free;

  if (limit === Infinity) return { allowed: true, plan };

  const startOfMonth = new Date();
  startOfMonth.setDate(1);
  startOfMonth.setHours(0, 0, 0, 0);

  const { count } = await sb
    .from("ai_usage_log")
    .select("*", { count: "exact", head: true })
    .eq("user_id", user.id)
    .gte("created_at", startOfMonth.toISOString());

  if ((count || 0) >= limit) {
    return { allowed: false, plan, limit, used: count };
  }
  return { allowed: true, plan, limit, used: count };
}

async function logUsage(user, action) {
  // Admin actions aren't metered, so skip logging them — keeps usage
  // stats meaningful for real paying/free users only.
  const { data: profile } = await sb.from("profiles").select("is_admin").eq("id", user.id).single();
  if (profile?.is_admin) return;

  await sb.from("ai_usage_log").insert({ user_id: user.id, action });
}

// Displayed alongside the NGN price so users billing outside Nigeria can see
// roughly what they'll pay in their own currency. Paystack only charges in
// NGN here, so this is a reference conversion, not a separate charge option.
const DISPLAY_CURRENCIES = [
  { code: "USD", symbol: "$" },
  { code: "GBP", symbol: "£" },
  { code: "EUR", symbol: "€" },
];

async function getNgnRates() {
  const cacheKey = "cb_ngn_rates";
  try {
    const cached = JSON.parse(localStorage.getItem(cacheKey) || "null");
    if (cached && Date.now() - cached.fetchedAt < 12 * 60 * 60 * 1000) {
      return cached.rates;
    }
  } catch (e) {}

  try {
    const res = await fetch("https://open.er-api.com/v6/latest/NGN");
    const data = await res.json();
    const rates = data?.rates || null;
    if (rates) {
      try { localStorage.setItem(cacheKey, JSON.stringify({ rates, fetchedAt: Date.now() })); } catch (e) {}
    }
    return rates;
  } catch (e) {
    return null;
  }
}

function formatConversions(ngnAmount, rates) {
  if (!rates) return "";
  return DISPLAY_CURRENCIES.map(c => {
    const rate = rates[c.code];
    if (!rate) return null;
    const converted = ngnAmount * rate;
    return `${c.symbol}${converted.toLocaleString(undefined, { maximumFractionDigits: converted < 10 ? 2 : 0 })}`;
  }).filter(Boolean).join(" · ");
}

async function renderBilling(user) {
  const { data: subscription } = await sb.from("subscriptions").select("*").eq("user_id", user.id).single();
  const currentPlan = subscription?.plan || "free";
  const rates = await getNgnRates();

  app.innerHTML = `
    <div class="topbar">
      <h1 style="font-size:20px;margin:0;">Billing</h1>
      <button class="secondary" id="backBtn">Back</button>
    </div>

    <div class="card">
      <h2>Current Plan: ${currentPlan.charAt(0).toUpperCase() + currentPlan.slice(1)}</h2>
      <p class="msg">${subscription?.current_period_end ? "Renews " + new Date(subscription.current_period_end).toLocaleDateString() : "Free plan — 15 AI actions per month"}</p>
    </div>

    ${PLANS.map(p => `
      <div class="card">
        <h2>${p.label} — ₦${p.price.toLocaleString()}/month</h2>
        ${rates ? `<p class="msg" style="color:#888;">≈ ${formatConversions(p.price, rates)} /month</p>` : ""}
        <p class="msg">${p.credits} AI actions per month</p>
        <button class="upgrade-btn" data-plan="${p.key}" data-amount="${p.amountKobo}" ${currentPlan === p.key ? "disabled" : ""}>
          ${currentPlan === p.key ? "Current Plan" : "Upgrade"}
        </button>
      </div>
    `).join("")}

    <p class="msg" style="text-align:center;color:#999;">Charged in Nigerian Naira (NGN) via Paystack. Other currencies shown are approximate.</p>
    <div class="msg hidden" id="billingMsg"></div>
  `;

  document.getElementById("backBtn").addEventListener("click", () => {
    window.location.hash = "dashboard";
  });

  document.querySelectorAll(".upgrade-btn").forEach(btn => {
    btn.addEventListener("click", () => startCheckout(btn.dataset.amount));
  });

  function startCheckout(amountKobo) {
    const handler = PaystackPop.setup({
      key: PAYSTACK_PUBLIC_KEY,
      email: user.email,
      amount: Number(amountKobo),
      currency: "NGN",
      ref: "cb_" + Date.now(),
      callback: function (response) {
        verifyPayment(response.reference);
      },
      onClose: function () {},
    });
    handler.openIframe();
  }

  async function verifyPayment(reference) {
    const msg = document.getElementById("billingMsg");
    msg.classList.remove("hidden");
    msg.className = "msg";
    msg.textContent = "Verifying payment...";

    try {
      const { data: sessionData } = await sb.auth.getSession();
      const token = sessionData.session.access_token;

      const res = await fetch(VERIFY_PAYMENT_FUNCTION_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`,
          "apikey": SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({ reference }),
      });
      const data = await res.json();

      if (data.error) {
        msg.className = "msg error";
        msg.textContent = data.error;
        return;
      }

      msg.className = "msg success";
      msg.textContent = `Upgraded to ${data.plan}!`;
      setTimeout(() => renderBilling(user), 1000);
    } catch (err) {
      msg.className = "msg error";
      msg.textContent = "Verification failed: " + err.message;
    }
  }
}

// ADMIN DASHBOARD (Phase 8)

async function renderAdmin(user) {
  const { data: profile } = await sb.from("profiles").select("is_admin").eq("id", user.id).single();

  if (!profile?.is_admin) {
    app.innerHTML = `
      <div class="card">
        <h2>Not authorized</h2>
        <p class="msg">This page is restricted to admin accounts.</p>
        <p class="link"><a href="#dashboard">Back to dashboard</a></p>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="topbar">
      <h1 style="font-size:20px;margin:0;">Admin Dashboard</h1>
      <button class="secondary" id="backBtn">Back</button>
    </div>
    <div id="adminBody"><p class="msg">Loading stats...</p></div>
  `;

  document.getElementById("backBtn").addEventListener("click", () => {
    window.location.hash = "dashboard";
  });

  const body = document.getElementById("adminBody");

  // Run all the stat queries in parallel
  const [
    { count: totalUsers },
    { data: subs },
    { data: payments },
    { count: totalJobs },
    { data: usage },
  ] = await Promise.all([
    sb.from("profiles").select("*", { count: "exact", head: true }),
    sb.from("subscriptions").select("plan, status"),
    sb.from("payments").select("amount_kobo, created_at").eq("status", "success"),
    sb.from("jobs").select("*", { count: "exact", head: true }),
    sb.from("ai_usage_log").select("action, created_at"),
  ]);

  const planCounts = {};
  (subs || []).forEach(s => {
    planCounts[s.plan] = (planCounts[s.plan] || 0) + 1;
  });

  const adminRates = await getNgnRates();
  const totalRevenueNaira = (payments || []).reduce((sum, p) => sum + (p.amount_kobo || 0), 0) / 100;

  const startOfMonth = new Date();
  startOfMonth.setDate(1);
  startOfMonth.setHours(0, 0, 0, 0);
  const revenueThisMonth = (payments || [])
    .filter(p => new Date(p.created_at) >= startOfMonth)
    .reduce((sum, p) => sum + (p.amount_kobo || 0), 0) / 100;

  const usageThisMonth = (usage || []).filter(u => new Date(u.created_at) >= startOfMonth).length;
  const usageByAction = {};
  (usage || []).forEach(u => {
    usageByAction[u.action] = (usageByAction[u.action] || 0) + 1;
  });

  body.innerHTML = `
    <div class="grid-2">
      <div class="card"><h2 style="font-size:14px;color:#666;">Total Users</h2><p style="font-size:28px;font-weight:700;margin:0;">${totalUsers || 0}</p></div>
      <div class="card"><h2 style="font-size:14px;color:#666;">Total Jobs Indexed</h2><p style="font-size:28px;font-weight:700;margin:0;">${totalJobs || 0}</p></div>
      <div class="card"><h2 style="font-size:14px;color:#666;">Total Revenue</h2><p style="font-size:28px;font-weight:700;margin:0;">₦${totalRevenueNaira.toLocaleString()}</p>${adminRates ? `<p class="msg" style="color:#888;">≈ ${formatConversions(totalRevenueNaira, adminRates)}</p>` : ""}</div>
      <div class="card"><h2 style="font-size:14px;color:#666;">Revenue This Month</h2><p style="font-size:28px;font-weight:700;margin:0;">₦${revenueThisMonth.toLocaleString()}</p>${adminRates ? `<p class="msg" style="color:#888;">≈ ${formatConversions(revenueThisMonth, adminRates)}</p>` : ""}</div>
    </div>

    <div class="card">
      <h2>Plan Breakdown</h2>
      ${Object.entries(planCounts).map(([plan, count]) => `<p class="msg">${plan}: ${count}</p>`).join("") || '<p class="msg">No subscriptions yet</p>'}
    </div>

    <div class="card">
      <h2>AI Usage This Month</h2>
      <p class="msg">Total actions: ${usageThisMonth}</p>
      ${Object.entries(usageByAction).map(([action, count]) => `<p class="msg">${action}: ${count}</p>`).join("")}
    </div>
  `;
}
